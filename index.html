<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wobbly Life: Space Edition (Universal Flight Build)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            user-select: none;
            touch-action: none; /* Prevents mobile browser zooming or bouncing */
        }

        body {
            background: linear-gradient(135deg, #0f0c1b, #201a36);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .screen {
            display: none;
            width: 100%;
            max-width: 850px;
            padding: 20px;
            background: rgba(20, 15, 40, 0.95);
            border: 4px solid #3d2f75;
            border-radius: 25px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            text-align: center;
            position: relative;
        }

        .active { display: block; }

        h1 {
            font-size: 2.5rem;
            color: #ffdf00;
            text-shadow: 3px 3px 0px #ff5722;
            margin-bottom: 15px;
        }

        h2 { color: #00ffd8; margin-bottom: 10px; font-size: 1.8rem; }

        .btn {
            background: linear-gradient(to bottom, #ffeb3b, #ff9800);
            border: 3px solid #ffffff;
            border-radius: 15px;
            color: #000;
            padding: 12px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #b36b00;
            margin: 8px;
            display: inline-block;
            transition: transform 0.1s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b36b00; }

        .hud {
            display: flex;
            justify-content: space-around;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 2px dashed #3d2f75;
            font-size: 1.1rem;
        }

        .wobbly-bucks { color: #4caf50; font-weight: bold; }

        /* --- ARCADE WINDOW CANVAS --- */
        canvas {
            background: #04020a;
            border: 4px solid #1e173b;
            border-radius: 15px;
            display: block;
            margin: 0 auto;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
            cursor: crosshair;
            max-width: 100%;
            height: auto;
        }

        .controls-hint {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 0.9rem;
            color: #ccc;
            font-weight: bold;
        }

        /* --- MENU POPUP --- */
        #job-popup {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #191430;
            border: 4px solid #00ffd8;
            border-radius: 20px;
            padding: 20px;
            z-index: 100;
            width: 85%;
        }

        .job-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }

        .job-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid #3d2f75;
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
        }
        .job-card:hover:not(.done) { border-color: #ffdf00; background: rgba(255,255,255,0.1); }
        .job-card.done { border-color: #4caf50; opacity: 0.5; cursor: not-allowed; }

        /* --- SHOP GRID --- */
        .shop-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .shop-item { background: rgba(0,0,0,0.4); border: 2px solid #ff9800; border-radius: 15px; padding: 15px; }
        
        .frozen-alert {
            position: absolute;
            background: rgba(0, 150, 255, 0.8);
            border: 2px solid #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            top: 40%; left: 35%;
            z-index: 50;
            display: none;
        }
    </style>
</head>
<body>

    <div id="screen-title" class="screen active">
        <h1>WOBBLY LIFE:<br>SPACE FLIGHT EDITION</h1>
        <div style="font-size: 70px; margin: 15px; animation: float 2s infinite alternate;">🛸
